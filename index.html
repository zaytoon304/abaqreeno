<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عبقرينو - مهارات حسابية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f5c842;
    --gold-light: #fde98a;
    --blue: #4a7fa5;
    --blue-light: #b8d8ea;
    --dark: #1a2a3a;
    --white: #fff;
    --green: #2ecc71;
    --red: #e74c3c;
    --shadow: 0 8px 32px rgba(74,127,165,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: linear-gradient(135deg, #1a2a3a 0%, #2c4a6e 60%, #1a2a3a 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .card {
    background: #fff;
    border-radius: 24px;
    padding: 32px 28px 28px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    position: relative;
    z-index: 1;
    border: 3px solid var(--blue);
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .school-name {
    font-size: 22px;
    font-weight: 900;
    color: var(--dark);
    line-height: 1.2;
  }

  .school-sub {
    font-size: 13px;
    color: var(--blue);
    font-weight: 700;
  }

  .logo {
    width: 56px;
    height: 56px;
    background: var(--dark);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
  }

  .divider {
    height: 2px;
    background: linear-gradient(90deg, var(--blue), var(--gold), var(--blue));
    margin: 12px 0 18px;
    border-radius: 2px;
  }

  .game-title {
    text-align: center;
    font-size: 24px;
    font-weight: 900;
    color: #8b0000;
    margin-bottom: 6px;
  }

  .game-subtitle {
    text-align: center;
    font-size: 13px;
    color: #555;
    margin-bottom: 22px;
    line-height: 1.6;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 22px;
    justify-content: center;
  }

  .btn {
    padding: 10px 22px;
    border: none;
    border-radius: 12px;
    font-family: 'Tajawal', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--dark);
    color: #fff;
  }
  .btn-primary:hover { background: var(--blue); transform: scale(1.04); }

  .btn-check {
    background: var(--gold);
    color: var(--dark);
  }
  .btn-check:hover { background: var(--gold-light); transform: scale(1.04); }

  .btn-clear {
    background: #eee;
    color: #555;
  }
  .btn-clear:hover { background: #ddd; }

  /* Grid */
  .grid-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 18px;
  }

  .grid-outer {
    display: grid;
    grid-template-columns: repeat(4, 72px);
    grid-template-rows: repeat(4, 72px);
    gap: 4px;
    background: var(--dark);
    padding: 6px;
    border-radius: 14px;
    box-shadow: var(--shadow);
  }

  .cell {
    width: 72px;
    height: 72px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 900;
    font-family: 'Tajawal', sans-serif;
  }

  /* Empty corner cell */
  .cell.corner {
    background: transparent;
  }

  /* Sum cells (gold) */
  .cell.sum {
    background: var(--gold);
    color: var(--dark);
    font-size: 28px;
  }

  /* Input cells (blue) */
  .cell.input-cell {
    background: var(--blue-light);
    position: relative;
  }

  .cell input {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    text-align: center;
    font-size: 26px;
    font-weight: 900;
    font-family: 'Tajawal', sans-serif;
    color: var(--dark);
    outline: none;
    cursor: pointer;
  }

  .cell input:focus {
    background: rgba(74,127,165,0.2);
    border-radius: 8px;
  }

  .cell.correct { background: #b6f0c8 !important; }
  .cell.wrong   { background: #ffc8c8 !important; }

  /* Message */
  .message {
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    min-height: 28px;
    margin-bottom: 10px;
    transition: all 0.3s;
  }
  .message.success { color: var(--green); }
  .message.error   { color: var(--red); }

  /* Score */
  .score-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    font-size: 14px;
    font-weight: 700;
    color: #555;
  }

  .score-bar span { color: var(--dark); font-size: 18px; }

  /* Confetti */
  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    width: 12px;
    height: 12px;
    opacity: 0;
    animation: confettiFall 2s ease-in forwards;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(-30px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Difficulty selector */
  .diff-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
  }

  .diff-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 2px solid #ddd;
    background: #fff;
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    color: #555;
    transition: all 0.2s;
  }
  .diff-btn.active {
    background: var(--dark);
    color: #fff;
    border-color: var(--dark);
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    z-index: 1;
    position: relative;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div>
      <div class="school-name">مدارس الأرقم</div>
      <div class="school-sub">رعاية الموهوبين</div>
    </div>
    <div class="logo">🏫</div>
  </div>
  <div class="divider"></div>

  <div class="game-title">تمرين مهارات حسابية (عبقرينو)</div>
  <div class="game-subtitle">
    ضع الأرقام من 1 إلى 9 في الخانات الزرقاء<br>
    بحيث يصح مجموع كل صف وعمود 🧠
  </div>

  <div class="diff-row">
    <button class="diff-btn active" onclick="setDifficulty('easy')">سهل</button>
    <button class="diff-btn" onclick="setDifficulty('medium')">متوسط</button>
    <button class="diff-btn" onclick="setDifficulty('hard')">صعب</button>
  </div>

  <!-- 4×4 grid: 3×3 inputs + row/col sums + empty corner -->
  <!-- Layout: rows 0-2 = data rows, row 3 = col sums; cols 0-2 = data, col 3 = row sums -->
  <div class="grid-wrapper">
    <div class="grid-outer" id="grid"></div>
  </div>

  <div class="message" id="message"></div>

  <div class="controls">
    <button class="btn btn-primary" onclick="newPuzzle()">🔀 لغز جديد</button>
    <button class="btn btn-check" onclick="checkAnswers()">✅ تحقق</button>
    <button class="btn btn-clear" onclick="clearInputs()">🗑️ مسح</button>
  </div>

  <div class="score-bar">
    <div>النجاحات: <span id="wins">0</span></div>
    <div>المحاولات: <span id="attempts">0</span></div>
  </div>
</div>

<div class="confetti-container" id="confetti"></div>

<div class="footer">مدارس الأرقم · رعاية الموهوبين</div>

<script>
// ─── State ────────────────────────────────────────────
let solution = [];      // 3×3 solution grid
let rowSums = [];       // [r0, r1, r2]
let colSums = [];       // [c0, c1, c2]
let wins = 0, attempts = 0;
let difficulty = 'easy';

// ─── Difficulty: how many cells are pre-filled ────────
const HINTS = { easy: 3, medium: 2, hard: 1 };

// ─── Generate a valid puzzle ──────────────────────────
function generatePuzzle() {
  // Shuffle 1-9
  const nums = shuffle([1,2,3,4,5,6,7,8,9]);
  solution = [
    [nums[0], nums[1], nums[2]],
    [nums[3], nums[4], nums[5]],
    [nums[6], nums[7], nums[8]],
  ];
  rowSums = solution.map(row => row.reduce((a,b)=>a+b,0));
  colSums = [0,1,2].map(c => solution.reduce((a,r)=>a+r[c],0));
}

function shuffle(a) {
  for (let i=a.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// ─── Render grid ──────────────────────────────────────
function renderGrid(hints) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  // hint positions (shown cells)
  const hintSet = new Set();
  const allPos = shuffle([0,1,2,3,4,5,6,7,8]);
  for (let i=0;i<hints;i++) hintSet.add(allPos[i]);

  // 4 rows × 4 cols
  for (let r=0;r<4;r++) {
    for (let c=0;c<4;c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';

      if (r < 3 && c < 3) {
        // Data cell
        const idx = r*3+c;
        cell.classList.add('input-cell');
        cell.dataset.r = r;
        cell.dataset.c = c;

        if (hintSet.has(idx)) {
          // Pre-filled hint
          cell.innerHTML = `<input type="number" min="1" max="9" value="${solution[r][c]}" readonly style="color:var(--blue);font-weight:900;">`;
          cell.dataset.fixed = 'true';
        } else {
          const inp = document.createElement('input');
          inp.type = 'number';
          inp.min = 1; inp.max = 9;
          inp.placeholder = '?';
          inp.addEventListener('input', () => liveCheck(inp, r, c));
          cell.appendChild(inp);
        }

      } else if (r === 3 && c < 3) {
        // Column sum
        cell.classList.add('sum');
        cell.textContent = colSums[c];
      } else if (c === 3 && r < 3) {
        // Row sum
        cell.classList.add('sum');
        cell.textContent = rowSums[r];
      } else {
        // Bottom-right corner (empty)
        cell.classList.add('corner');
      }

      grid.appendChild(cell);
    }
  }
}

// ─── Live colour feedback ─────────────────────────────
function liveCheck(inp, r, c) {
  const val = parseInt(inp.value);
  const cell = inp.parentElement;
  cell.classList.remove('correct','wrong');
  if (!isNaN(val)) {
    if (val === solution[r][c]) cell.classList.add('correct');
    else cell.classList.add('wrong');
  }
}

// ─── Check all answers ────────────────────────────────
function checkAnswers() {
  attempts++;
  document.getElementById('attempts').textContent = attempts;

  const cells = document.querySelectorAll('.cell.input-cell');
  let allCorrect = true;

  cells.forEach(cell => {
    const r = parseInt(cell.dataset.r);
    const c = parseInt(cell.dataset.c);
    const inp = cell.querySelector('input');
    const val = parseInt(inp.value);
    cell.classList.remove('correct','wrong');

    if (cell.dataset.fixed) return; // skip hints

    if (val === solution[r][c]) {
      cell.classList.add('correct');
    } else {
      cell.classList.add('wrong');
      allCorrect = false;
    }
  });

  const msg = document.getElementById('message');
  if (allCorrect) {
    wins++;
    document.getElementById('wins').textContent = wins;
    msg.textContent = '🎉 ممتاز! أجبت بشكل صحيح!';
    msg.className = 'message success';
    launchConfetti();
  } else {
    msg.textContent = '❌ بعض الإجابات خاطئة، حاول مجدداً!';
    msg.className = 'message error';
  }
}

// ─── New puzzle ───────────────────────────────────────
function newPuzzle() {
  generatePuzzle();
  renderGrid(HINTS[difficulty]);
  document.getElementById('message').textContent = '';
  document.getElementById('message').className = 'message';
}

// ─── Clear inputs ─────────────────────────────────────
function clearInputs() {
  document.querySelectorAll('.cell.input-cell:not([data-fixed]) input').forEach(inp => {
    inp.value = '';
    inp.parentElement.classList.remove('correct','wrong');
  });
  document.getElementById('message').textContent = '';
}

// ─── Difficulty ───────────────────────────────────────
function setDifficulty(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  newPuzzle();
}

// ─── Confetti ─────────────────────────────────────────
function launchConfetti() {
  const container = document.getElementById('confetti');
  container.innerHTML = '';
  const colors = ['#f5c842','#4a7fa5','#2ecc71','#e74c3c','#9b59b6','#e67e22'];
  for (let i=0;i<60;i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random()*100+'vw';
    piece.style.top = '-20px';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
    piece.style.animationDelay = Math.random()*1.2+'s';
    piece.style.width = (8+Math.random()*10)+'px';
    piece.style.height = (8+Math.random()*10)+'px';
    container.appendChild(piece);
  }
  setTimeout(()=>container.innerHTML='', 3000);
}

// ─── Init ─────────────────────────────────────────────
newPuzzle();
</script>
</body>
</html>
